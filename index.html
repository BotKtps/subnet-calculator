<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Calculator - Dicko Dev Tools</title>
    <style>
        /* CSS Variables untuk tema */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #3b82f6;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --logo-text: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* Logo Styles */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--logo-text);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary-color);
            background: rgba(37, 99, 235, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .tool-name {
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Input Form Styles */
        .input-group {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .form-control {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #4b5563;
        }

        input, select {
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        /* Result Styles */
        .results {
            margin-top: 2rem;
            display: none; /* Hidden by default */
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
        }

        .result-table th, .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .result-table th {
            color: #6b7280;
            font-weight: 600;
            width: 40%;
        }

        .result-table td {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
            color: var(--text-color);
        }

        /* Highlight Wildcard Row */
        .wildcard-row th, .wildcard-row td {
            background-color: #f0f9ff;
            color: var(--primary-color);
        }

        .result-table tr:last-child td, 
        .result-table tr:last-child th {
            border-bottom: none;
        }

        .error-msg {
            color: #dc2626;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }

        @media (max-width: 480px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">Dicko <span>Dev Tools</span></div>
            <div class="tool-name">IP Subnet & Wildcard Calculator</div>
        </div>

        <div class="calculator-form">
            <div class="input-group">
                <div class="form-control">
                    <label for="ipAddress">IP Address</label>
                    <input type="text" id="ipAddress" placeholder="Contoh: 192.168.1.1" value="192.168.1.1">
                </div>
                <div class="form-control">
                    <label for="cidr">CIDR</label>
                    <select id="cidr">
                        <!-- Javascript will populate this -->
                    </select>
                </div>
            </div>
            <button onclick="calculateSubnet()">Hitung Subnet</button>
            <div id="errorMessage" class="error-msg">Format IP Address tidak valid!</div>
        </div>

        <div id="results" class="results">
            <table class="result-table">
                <tr>
                    <th>IP Address</th>
                    <td id="resIP"></td>
                </tr>
                <tr>
                    <th>Subnet Mask</th>
                    <td id="resMask"></td>
                </tr>
                <!-- Bagian Wildcard ditambahkan disini -->
                <tr class="wildcard-row">
                    <th>Wildcard Mask</th>
                    <td id="resWildcard"></td>
                </tr>
                <tr>
                    <th>Network Address</th>
                    <td id="resNet"></td>
                </tr>
                <tr>
                    <th>Broadcast Address</th>
                    <td id="resBroad"></td>
                </tr>
                <tr>
                    <th>First Usable IP</th>
                    <td id="resFirst"></td>
                </tr>
                <tr>
                    <th>Last Usable IP</th>
                    <td id="resLast"></td>
                </tr>
                <tr>
                    <th>Total Hosts</th>
                    <td id="resTotal"></td>
                </tr>
                <tr>
                    <th>Usable Hosts</th>
                    <td id="resUsable"></td>
                </tr>
                <tr>
                    <th>IP Class</th>
                    <td id="resClass"></td>
                </tr>
                <tr>
                    <th>IP Binary</th>
                    <td id="resBin" style="font-size: 0.8em; color: #666;"></td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        // Populate CIDR Dropdown
        const cidrSelect = document.getElementById('cidr');
        for (let i = 32; i >= 1; i--) {
            let option = document.createElement('option');
            option.value = i;
            option.text = `/${i}`;
            if (i === 24) option.selected = true; 
            cidrSelect.appendChild(option);
        }

        // Helper functions
        function ipToInt(ip) {
            return ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;
        }

        function intToIp(int) {
            return [
                (int >>> 24) & 0xFF,
                (int >>> 16) & 0xFF,
                (int >>> 8) & 0xFF,
                int & 0xFF
            ].join('.');
        }

        function isValidIP(ip) {
            const pattern = /^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            return pattern.test(ip);
        }

        function getIpClass(firstOctet) {
            if (firstOctet >= 1 && firstOctet <= 126) return 'A';
            if (firstOctet >= 128 && firstOctet <= 191) return 'B';
            if (firstOctet >= 192 && firstOctet <= 223) return 'C';
            if (firstOctet >= 224 && firstOctet <= 239) return 'D (Multicast)';
            if (firstOctet >= 240 && firstOctet <= 254) return 'E (Experimental)';
            return 'Unknown/Loopback';
        }

        function intToBinaryString(int) {
            let bin = (int >>> 0).toString(2);
            while (bin.length < 32) bin = "0" + bin;
            return bin.match(/.{1,8}/g).join('.');
        }

        // Main Calculation
        function calculateSubnet() {
            const ipInput = document.getElementById('ipAddress').value.trim();
            const cidrInput = parseInt(document.getElementById('cidr').value);
            const errorDiv = document.getElementById('errorMessage');
            const resultDiv = document.getElementById('results');

            if (!isValidIP(ipInput)) {
                errorDiv.style.display = 'block';
                resultDiv.style.display = 'none';
                return;
            }
            errorDiv.style.display = 'none';

            const ipInt = ipToInt(ipInput);
            
            // Subnet Mask Calculation
            const maskInt = ~((1 << (32 - cidrInput)) - 1) >>> 0;
            
            // Wildcard Calculation (Invers dari Subnet Mask)
            const wildcardInt = ~maskInt >>> 0;

            const networkInt = (ipInt & maskInt) >>> 0;
            const broadcastInt = (networkInt | (~maskInt)) >>> 0;

            let firstUsableInt, lastUsableInt, usableHosts;
            const totalHosts = Math.pow(2, 32 - cidrInput);

            if (cidrInput === 32) {
                firstUsableInt = networkInt;
                lastUsableInt = networkInt;
                usableHosts = 1;
            } else if (cidrInput === 31) {
                firstUsableInt = networkInt;
                lastUsableInt = broadcastInt;
                usableHosts = 2;
            } else {
                firstUsableInt = (networkInt + 1) >>> 0;
                lastUsableInt = (broadcastInt - 1) >>> 0;
                usableHosts = totalHosts - 2;
            }

            // Update DOM
            document.getElementById('resIP').innerText = ipInput + " /" + cidrInput;
            document.getElementById('resMask').innerText = intToIp(maskInt);
            
            // Set Wildcard Result
            document.getElementById('resWildcard').innerText = intToIp(wildcardInt);

            document.getElementById('resNet').innerText = intToIp(networkInt);
            document.getElementById('resBroad').innerText = intToIp(broadcastInt);
            document.getElementById('resFirst').innerText = intToIp(firstUsableInt);
            document.getElementById('resLast').innerText = intToIp(lastUsableInt);
            document.getElementById('resTotal').innerText = totalHosts.toLocaleString();
            document.getElementById('resUsable').innerText = usableHosts.toLocaleString();
            
            const firstOctet = parseInt(ipInput.split('.')[0]);
            document.getElementById('resClass').innerText = getIpClass(firstOctet);
            document.getElementById('resBin').innerText = intToBinaryString(ipInt);

            resultDiv.style.display = 'block';
        }

        // Event Listener Enter
        document.getElementById("ipAddress").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                calculateSubnet();
            }
        });
    </script>
</body>
</html>
